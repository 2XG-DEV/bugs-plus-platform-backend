services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bugsplus
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./app:/app/app
      - ./prisma:/app/prisma
      - ./prisma.config.ts:/app/prisma.config.ts
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/bugsplus"
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
